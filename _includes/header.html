<header class="sticky top-0 z-50 bg-primary shadow-md" x-data="{ open: false }">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">

      <div class="flex flex-col leading-tight">
        <a href="{{ '/' | relative_url }}" class="font-script text-xl text-white hover:text-gold transition-colors">Caro für Hunde</a>
        <a href="https://www.carotelzumbuntenhund.de/" target="_blank" rel="noopener" class="text-white/70 text-xs font-medium tracking-wide hover:text-gold transition-colors">Carotel – Zum bunten Hund</a>
      </div>

      <nav class="hidden lg:flex items-center gap-0.5">
        {% for item in site.data.navigation %}
        <a href="{{ item.url | relative_url }}"
           class="px-2.5 py-2 rounded-lg text-xs font-semibold text-white uppercase tracking-normal whitespace-nowrap hover:text-gold hover:bg-white/10 transition-colors">
          {{ item.name }}
        </a>
        {% endfor %}
      </nav>

      <div class="flex items-center gap-3">
        <a href="{{ site.booking_url }}" target="_blank" rel="noopener"
           class="hidden lg:inline-flex bg-gold hover:bg-gold-dark text-gray-900 font-bold px-4 py-2 rounded-xl transition-colors text-xs uppercase tracking-normal whitespace-nowrap">
          Termin buchen
        </a>
        <button @click="open = !open"
                class="lg:hidden p-2 rounded-lg hover:bg-white/20 transition-colors"
                :aria-expanded="open.toString()">
          <svg x-show="!open" class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
          <svg x-show="open" x-cloak class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>

    </div>
  </div>

  <div x-show="open"
       x-cloak
       x-transition:enter="transition ease-out duration-150"
       x-transition:enter-start="opacity-0 -translate-y-1"
       x-transition:enter-end="opacity-100 translate-y-0"
       x-transition:leave="transition ease-in duration-100"
       x-transition:leave-start="opacity-100 translate-y-0"
       x-transition:leave-end="opacity-0 -translate-y-1"
       class="lg:hidden border-t border-white/20 bg-primary">
    <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col gap-1">
      {% for item in site.data.navigation %}
      <a href="{{ item.url | relative_url }}"
         class="px-4 py-3 rounded-lg text-white hover:text-gold hover:bg-white/10 font-semibold uppercase tracking-wide text-sm transition-colors"
         @click="open = false">
        {{ item.name }}
      </a>
      {% endfor %}
      <a href="{{ site.booking_url }}" target="_blank" rel="noopener"
         class="mt-3 bg-gold hover:bg-gold-dark text-gray-900 font-bold px-4 py-3 rounded-xl text-center transition-colors uppercase tracking-wide text-sm">
        Termin buchen
      </a>
    </div>
  </div>
</header>
