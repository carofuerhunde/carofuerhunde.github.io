- title: Personal Coaching
  slug: personal-coaching
  icon: "🎯"
  image: "/assets/images/services/Freche.jpeg"
  short: "Individuelles Training für Verhaltensprobleme, Bindungsaufbau und gezielte Förderung."
  details: |
    Persönliches Coaching bedeutet **maßgeschneiderte Unterstützung** – abgestimmt auf Ihre Bedürfnisse und die Ihres Hundes.

    **Vorteile auf einen Blick:**
    - Individuell entwickelte Übungen für Charakter und Verhalten Ihres Hundes
    - Kontinuierliches Feedback und flexible Terminplanung
    - Stärkung der Bindung durch positiv besetzte gemeinsame Übungen
    - Hilfe bei Aggression, Angstverhalten, übermäßigem Bellen und Alltagsunsicherheiten

    **So läuft es ab:**
    1. Erstgespräch – Situationsanalyse, Ziele, individueller Plan
    2. Praktische Einheiten in Theorie und Praxis
    3. Feedback & Anpassung nach jeder Einheit
    4. Langfristige Begleitung auch nach dem Coaching

    Wir arbeiten **respektvoll, verständnisvoll und belohnungsbasiert** – ohne Gewalt, mit wissenschaftlich fundierten Methoden.

- title: Hundebetreuung
  slug: hundebetreuung
  icon: "🏡"
  image: "/assets/images/services/Tussi.jpeg"
  short: "Liebevolle Betreuung im Carotel mit Auslauf, Gemeinschaft und persönlicher Fürsorge."
  details: |
    Unsere Hundepension bietet eine **liebevolle und fürsorgliche Umgebung** – denn auch Hunde verdienen Urlaub!

    **Was euer Hund bekommt:**
    - Mindestens 3 Gassigänge täglich (bei Bedarf mehr)
    - Eigenes Zimmer mit Schlafplatz, Spielzeug und persönlichen Gegenständen
    - Individuelle Betreuung durch erfahrenes Fachpersonal
    - Tierarzt jederzeit erreichbar

    **Lizenziert nach §11 Tierschutzgesetz** – höchste Standards in der Tierpflege.

    **Wichtig:** Termine werden vorab vereinbart. Bringen und Abholen nur nach Absprache.

    Aktuelle Preise und Stornierungsbedingungen findest du auf unserer [Preisseite](/preise/).

- title: Alltagstraining
  slug: alltagstraining
  icon: "🦮"
  image: "/assets/images/services/Pisser.jpeg"
  short: "Sicheres und entspanntes Verhalten in echten Alltagssituationen."
  details: |
    **In der Gruppe (max. 6 Teams) oder als Einzeltraining** – wir trainieren dort, wo der Alltag wirklich stattfindet: im Park, im Einkaufszentrum, im Restaurant.

    **Was wir trainieren:**
    - Leinenführigkeit
    - Verhalten gegenüber anderen Hunden und Menschen
    - Ruhe in der Öffentlichkeit
    - Allgemeine Gehorsamkeit und Alltagstauglichkeit

    **Methodik:** Positive Verstärkung, Geduld und Verständnis – auf Basis moderner Verhaltensforschung. Ihr lernt dabei auch, die Körpersprache eures Hundes besser zu lesen.

    **Ablauf:**
    1. Erstgespräch & individueller Trainingsplan
    2. Praktische Übungen in Theorie und Praxis
    3. Regelmäßiges Feedback & Anpassung
    4. Langfristige Begleitung

- title: Hundesport
  slug: hundesport
  icon: "🏆"
  image: "/assets/images/services/Schlitzohr.jpeg"
  short: "Mondioring, IGP, Begleithundeprüfung und Fitnesstraining für aktive Hunde-Teams."
  details: |
    Hundesport stärkt Bindung, körperliche Fitness und geistige Auslastung. Wir bieten:

    - **Mondioring** – Schutzdienst, Unterordnung und Agility kombiniert
    - **IGP** – Fährtenarbeit, Unterordnung, Schutzdienst
    - **Begleithundetraining** – Fundament für Alltag und weiterführenden Sport
    - **Spaß mit Hund** – Fitness, Mobilität und Wohlbefinden für jedes Team

    **Unsere Trainingsumgebung:**
    - Beleuchteter Trainingsplatz (auch bei Dunkelheit)
    - Gelände für Fährtenarbeit
    - Große Trainingshalle
    - Seminarraum für Workshops und Theorieeinheiten
    - Videoanalyse-Möglichkeit

    Zwei speziell ausgebildete **Figuranten** und physiotherapeutisch geschulte Trainer ergänzen unser Team.

- title: Workshops
  slug: workshops
  icon: "📚"
  image: "/assets/images/services/Depperte.jpeg"
  short: "Praxisnahe Workshops für alle Levels – vor Ort oder auf Anfrage."
  details: |
    Ob auf unserem Trainingsgelände oder direkt bei euch – unsere Workshops sind individuell auf euch zugeschnitten.

    **Themenübersicht:**
    - Grunderziehung (positive Verstärkung, gewaltfrei)
    - Lösung von Verhaltensproblemen (Bellen, Ängste, Zerstörungsdrang)
    - Hundesport-Training (IGP, Mondioring, Fährtenarbeit)
    - **Erste Hilfe am Hund** und **Antigiftköder-Workshop**
    - Resozialisierung von Hunden mit schwieriger Vergangenheit
    - Teambuilding und Bindungsstärkung
    - Paketzusteller-Training
    - Workshops für Schulklassen und soziale Einrichtungen

    **Dauer:** je nach Thema 2,5 Tage bis 1 Woche. Regelmäßig mit **Gastreferenten**.

    Aktuelle Termine findest du auf unserer [Terminseite](/termine/).

- title: Assistenzhund PTBS
  slug: assistenzhund-ptbs
  icon: "❤️"
  image: "/assets/images/services/Stinker.jpeg"
  short: "Strukturierte und einfühlsame Ausbildung von PTBS-Assistenzhunden."
  details: |
    Die Ausbildung beginnt **ab der 8. Lebenswoche** in enger Zusammenarbeit mit dem Halter.

    **Ausbildungsphasen:**

    **Phase 1 – Basistraining:** Grundkommandos, Leinenführigkeit, Alltagsintegration

    **Phase 2 – PTBS-spezifische Aufgaben:**
    - Beruhigung in Stresssituationen
    - Unterbrechen negativer Verhaltensmuster
    - Raumüberwachung zur Sicherheitsvermittlung
    - SOS-Signale erkennen und Hilfe holen

    **Phase 3 – Individualisierte Assistenzfunktionen** – angepasst an die persönlichen Bedürfnisse und Symptome

    Am Ende erhält jedes Mensch-Hund-Team ein **Zertifikat** als Nachweis der erfolgreichen Ausbildung.

    Unsere Trainer bringen Erfahrung aus der Assistenzhundeausbildung (inkl. Blindenführhunde) mit und arbeiten einfühlsam und strukturiert.
